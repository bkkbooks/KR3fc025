body:
  text: 一億八百萬尺為實以表八尺除影六尺得每尺影七寸五分為法除之日逺人十萬里不知日徑幾何以徑寸長八尺竹筒對日於竹筒視之空正掩日問日徑幾何答曰日徑一千二百五十里術曰以十萬里為實以每八十寸得一寸為法除之得一千二百五十里兩餘勾小股求大勾股測望三十二城不知高逺立兩表各高一丈二尺前後參直兩表間相去八十尺前表退行六十尺人目薄地遙望城乳頭與前表末參合又從後表退行一百尺人目薄地遙望城乳頭與後表末參合問城高幾何去前表幾何答曰城高三丈六尺去前表一百二十尺術曰城高為勾城去前表為股以表間相去八十尺乘表高十二尺得九百六十尺為勾實又以表間相去八十尺乘前表退行六十尺得四千八百尺為股實却以前後二表退行相減餘四十尺為法法除勾實得二十四尺加表一十二尺為城之高法除股實得一百二十尺為城去前表之逺海中有島不知高逺立二表各高三丈前後相去一千
