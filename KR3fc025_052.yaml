body:
  text: 一億八百萬尺爲實以表八尺除影六尺得每尺影七寸五分爲法除之日逺人十萬里不知日徑幾何以徑寸長八尺竹筒對日於竹筒視之空正掩日問日徑幾何荅曰日徑一千二百五十里術曰以十萬里爲實以每八十寸得一寸爲法除之得一千二百五十里兩餘勾小股求大勾股測望三十二城不知高逺立兩表各高一丈二尺前後參直兩表間相去八十尺前表退行六十尺人目薄地遙望城乳頭與前表末參合又從後表退行一百尺人目薄地遙望城乳頭與後表末參合問城高幾何去前表幾何荅曰城高三丈六尺去前表一百二十尺術曰城高為勾城去前表爲股以表間相去八十尺乗表高十二尺得九百六十尺爲勾實又以表間相去八十尺乗前表退行六十尺得四千八百尺爲股實却以前後二表退行相减餘四十尺爲法法除勾實得二十四尺加表一十二尺爲城之高法除股實得一百二十尺爲城去前表之逺海中有島不知高逺立二表各高三丈前後相去一千
