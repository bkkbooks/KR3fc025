body:
  text: 得一百五十步為半邑方倍之為全邑方兩餘勾與股求容方三十術曰餘勾乘股倍之併二餘勾為從方平方開之邑方不知大小居中開門北門外二十步有木一株出南一十四步折而西行一千七百七十五步斜見木問邑方幾何答曰邑方二百五十步術曰出北門二十步一餘勾也出南門一十四步亦餘勾也西行股也斜見木弦也以北餘勾乘股倍之為實併二餘勾為從方平方開之小勾股與勾求股測望三十一塔不知高量其影從塔心至影末長三丈一尺二寸五分别立一表高一丈影長二尺五寸問塔高幾何答曰一十二丈五尺術曰以塔影三百一十二寸五分為實以表影二十五寸為法除之即得立八尺之表以測日影表去日下六萬里表影長六尺問日高幾何答曰日高八萬里術曰以六萬里每里三百六十步每步五尺通之得
