body:
  text: 得一百五十歩爲半邑方倍之爲全邑方兩餘勾與股求容方三十術曰餘勾乗股倍之併二餘勾爲從方平方開之邑方不知大小居中開門北門外二十歩有木一株出南一十四歩折而西行一千七百七十五歩斜見木問邑方幾何荅曰邑方二百五十歩術曰出北門二十歩一餘勾也出南門一十四歩亦餘勾也西行股也斜見木弦也以北餘勾乗股倍之爲實併二餘勾爲從方平方開之小勾股與勾求股測望三十一塔不知高量其影從塔心至影末長三丈一尺二寸五分别立一表高一丈影長二尺五寸問塔高幾何荅曰一十二丈五尺術曰以塔影三百一十二寸五分爲實以表影二十五寸爲法除之即得立八尺之表以測日影表去日下六萬里表影長六尺問日高幾何荅曰日高八萬里術曰以六萬里每里三百六十歩每歩五尺通之得
  hash: sha256:52a45727e2cf6a13702035f9aad78e3e7e988903fdeac4f3aa9b47cc97c5a82a
