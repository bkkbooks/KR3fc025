body:
  text: 術曰股自乘得三千六百股減弦較和餘勾弦較三十六為法除實得勾弦和一百加較半這為弦減較半之為勾以弦減弦較和得較股與弦和和求勾弦十三術曰股自乘股減弦和和即勾弦和除之得勾弦較以減勾弦和半之為勾加勾弦和半之為弦又曰以股減和餘為勾弦和問股六十尺弦和和一百六十尺為勾弦和各幾答曰勾三十二尺弦六十八尺勾股和九十二尺術曰股自乘得三千六百為實股減和餘一百為勾弦和除之得三十六為勾弦較勾與弦和較求股弦十四術曰勾自乘為實勾減較餘即股弦較為法除實得股弦和加股弦較半之為弦減股弦較半之為股問勾三十二尺弦和較二十四尺為股弦和各幾答曰股六十尺弦六十八尺和九十二尺術曰勾自乘得一千二十四為實勾減弦和較餘八即股弦較為法除實得股弦和一百二十八加股弦較半這為弦減股弦較半之為股勾股相併得和勾股田一假內容圓池一箇徑六步只云勾八步為股
  hash: sha256:df4e517e215d1a1e4e7a0b95c9f528d738c22b53c32813dea5bce07b291be2d4
