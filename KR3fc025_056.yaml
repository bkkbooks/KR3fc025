body:
  text: 六百萬寸以表高八十寸乗之得二十八億八千萬寸爲股實又以南表影六十寸乗表間相去二千里得二十一億六十萬寸爲勾實以差二寸爲法除股得一十四億四千萬寸以每里一萬八千寸約之得日高八萬里除勾實得一十億八百萬寸以每里一萬八千寸約之得日逺六萬里欲求表端斜至日以股八萬自乗得六十四億勾六萬自乗得三十六億併得百億爲弦實平方開之得弦十萬里隔水有木不知其高立二表各高一丈前後相去一丈五尺從前表退行五尺人目高四尺望木抄與前表齊平又從後表退行八尺目高四尺望木抄與後表齊問木高並去前表幾何荅曰木高四十尺前表去木二十五尺術曰木高爲股木去前表爲勾以表高一丈减人目四尺餘六尺以乗表間得九十尺爲股實以前表退行五尺乗表間得七十五尺爲勾實以二表退行相减餘三尺爲法除股實得三十尺加表高得木高四十尺除勾實得木去前表二十五尺深谷不知丈數偃矩崖上望之勾高六尺從勾端望谷底入股九尺一寸重設矩於上相去三丈從勾端望谷
