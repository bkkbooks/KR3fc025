body:
  text: 五十八萬六千尺以餘股三里通為五千四百尺除之加目高即得井徑五尺不知其深直立五尺木於井上從木末望井底人目入徑四寸問井深幾何答曰井深五丈七尺五寸術曰以井徑除目入四寸餘四十六寸與木高五十寸相乘得二千三百寸為容方積以餘勾四寸為法除之木不知逺近前有一池方十二丈立表四角從左視之前後二表與木適對從右視之去後表之右三尺望前右表與木始對問木逺幾何答曰木逺四百八十丈連池共逺四百九十二丈術曰池自乘為容方積勾三尺除之得餘股為木逺加池方為股餘勾餘股求容方二十九術曰餘勾餘股相乘平方開之邑不知大小四中開門北門外三十步有木出西門七百五十步見木問邑方幾何答曰三百步術曰餘勾餘股相乘得二萬二千五百步平方開之
