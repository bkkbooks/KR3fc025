body:
  text: 二分減入索十步餘通為一百六十六尺以東表退行十四步八分通為七十四尺相乘得一萬二千二百八十四尺為勾實以北行去表通為三百二十四尺以乘入索五十尺得一萬六千二百尺以表間相去二百一十六尺除之得七十五尺為景差又以北行去表減景差餘二百四十九尺以東表退行七十四尺乘之得一萬八千四百二十六尺為股實却以東表退行減景差餘一尺為法法除勾實得原數以步約之得二千四百五十六步八分加入表問四十三步二分得城方二千五百步法除股實得原數以步約之得城去表三千六百八十五步二分各以里約之合門又曰以表間相去減入索十步餘通為三百三十二分以乘東表退行一百四十八分得四萬九千一百三十六分為勾實以北行去表六百四十八分乘入索百分得六萬四千八十分以表間相去四百三十二分除之得一百五十分為景差又以後北行去表減景差餘四百九十八分以東表退行乘之得七萬三千七百四為股實以東表退行減景差餘二為法法除勾實得二萬四千五百六十八分每
