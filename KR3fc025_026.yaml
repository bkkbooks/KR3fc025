body:
  text: 較减和半之為股加和半之為弦直田一假廣三十二步縱斜相併一百二十八步為田幾何答曰八畝術曰縱斜相併自乘得一萬六千三百八十四步廣自乘得一千二十四相减折半得七千六百八十步為實併縱斜為法除之得股六十步竹高一丈折梢柱地去根三尺問折處高幾何答曰四尺二十分尺之十一術曰竹高為和自乘得萬寸去根三尺為勾自乘得九百寸相减餘九千一百寸為實倍和得二百寸為法除之得折處為股股與勾弦和求勾弦八術曰股自乘和除之得勾弦較以减和半之為勾加和半之為股問股十五尺勾弦和二十五尺為勾弦各幾答曰勾八尺弦十七尺術曰股自乘得二百二十五尺以和除之得九尺為勾弦較以减和半之為勾加和半之為弦直田一假長六十步廣斜共一百步為田幾何
