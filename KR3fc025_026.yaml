body:
  text: 較减和半之爲股加和半之爲弦直田一叚廣三十二歩縱斜相併一百二十八歩爲田幾何荅曰八畆術曰縱斜相併自乗得一萬六千三百八十四歩廣自乗得一千二十四相减折半得七千六百八十歩爲實併縱斜爲法除之得股六十歩竹高一丈折梢柱地去根三尺問折處高幾何荅曰四尺二十分尺之十一術曰竹高爲和自乗得萬寸去根三尺爲勾自乗得九百寸相减餘九千一百寸爲實倍和得二百寸爲法除之得折處爲股股與勾弦和求勾弦八術曰股自乗和除之得勾弦較以减和半之爲勾加和半之爲股問股十五尺勾弦和二十五尺爲勾弦各幾荅曰勾八尺弦十七尺術曰股自乗得二百二十五尺以和除之得九尺爲勾弦較以减和半之爲勾加和半之爲弦直田一叚長六十歩廣斜共一百歩爲田幾何
