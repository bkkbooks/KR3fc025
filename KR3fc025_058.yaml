body:
  text: 底入上股八尺五寸問谷深幾何答曰谷深四十一丈九尺術曰谷深如股以下矩入股九十一寸乘矩間相去三百寸得二萬七千三百寸為實以入二股數相减餘六寸為法除之得四千五百五十寸减矩間並勾得谷深乃下矩至谷底之數又術以入上股八十五寸乘矩間得二萬五千五百寸以二股相减餘六寸為法除之得四千二百五十寸减勾高六十寸得谷深若求谷底濶若干以勾六十寸乘矩間得一萬八千寸以相减餘六寸除之得三千寸乃谷底濶三十丈兩餘勾橫測望三十三方城不知大小立兩表東西相去四十三步二分齊人目處以索連之令東表與城東南隅東北隅參直從東表退北行去表一十四步八分遙望城西北隅入索東端一十步若從東表退北行去表六十四步八分遙望城西北隅適與西表相參合問城方幾何城去表幾何答曰城方六里三百四十步去表一十里八十五步五分步之一術曰城方為勾城去表為股以表間相去四十三步
