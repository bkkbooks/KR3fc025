body:
  text: 三十六分母减分子以乘分子仍得一十四加入半之得五千六百二十五為實平方開之如分母而一圓材徑二尺一寸得方靣幾何答曰徑一尺四寸五十八分寸之四十九術曰用弦以求股徑自乘半之為二百二十寸五分平方開之得一十四寸餘實二十四寸五分倍方加隅得法二十九寸法實皆倍約之此術楊輝摘竒算法作一尺四寸二百八十一分寸之二百四十五謬矣又引丘建算經李淳風注作一尺四寸二十五分寸之二十一不知何處恐亦傳寫之誤若三因徑得圍六尺三寸七因三除當為一尺四寸三十分寸之二十一始通勾弦求股二術曰勾弦各自乘相减餘為實平方開之問勾八步弦十七步為股幾何答曰十五步術曰弦自乘得二百八十九勾自乘得六十四相减餘二百二十五為實開平方法除之直田一假橫二十七步兩隅斜量四十五步問長幾何答曰三十六步術曰橫為勾斜為弦以求直為股圓木徑二尺五寸為板欲厚七寸澗幾何答曰二尺四寸
  hash: sha256:c451f9c1f476a42fd52f6a6c030a2b0fea7ddfc43c96daadba4a826ecab7240e
