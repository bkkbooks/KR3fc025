body:
  text: 三十六分母减分子以乗分子仍得一十四加入半之得五千六百二十五爲實平方開之如分母而一圓材徑二尺一寸得方靣幾何荅曰徑一尺四寸五十八分寸之四十九術曰用弦以求股徑自乗半之爲二百二十寸五分平方開之得一十四寸餘實二十四寸五分倍方加隅得法二十九寸法實皆倍約之此術楊輝摘竒筭法作一尺四寸二百八十一分寸之二百四十五謬矣又引丘建筭經李淳風注作一尺四寸二十五分寸之二十一不知何處恐亦傳寫之誤若三因徑得圍六尺三寸七因三除當爲一尺四寸三十分寸之二十一始通勾弦求股二術曰勾弦各自乗相减餘爲實平方開之問勾八歩弦十七歩爲股幾何荅曰十五歩術曰弦自乗得二百八十九勾自乗得六十四相减餘二百二十五爲實開平方法除之直田一叚橫二十七歩兩隅斜量四十五歩問長幾何荅曰三十六歩術曰橫爲勾斜爲弦以求直爲股圓木徑二尺五寸爲板欲厚七寸澗幾何荅曰二尺四寸
  hash: sha256:f9666ccefc848dd9d5b74da28e03c259717034c3850211711896b71673adc413
