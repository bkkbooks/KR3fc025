body:
  text: 吳興顧應祥著容方與餘勾求股二十八邑方二百步四面居中開門東門外十五步有木問出南門幾步見木答曰六百六十六步六分步之一術曰半邑方為容方自乘得一萬步為實以東門外十五步為餘勾為法除之此容方與餘勾求餘股邑東西七里南北九里各中開門東門外十五里有木問出南門外幾里見木答曰一里一十八步術曰以東西七里南北九里以每里三百六十步通之折半相乘得二百四萬一千二百步為實以東門外十五里為餘股以步通之得五千四百步為法除之此容方與餘股求餘勾山不知高東五十三里有木高九十五尺木東三里有人目高五尺望木末與山齊問山高幾何答曰山高一百五十九丈五尺術曰以山東五十三里每里一千八百尺通之得九萬五千四百尺以木高減人目乘之得容方積八百
