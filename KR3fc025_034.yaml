body:
  text: 弦各幾答曰股十五步弦十七步術曰容圓徑即弦和較股與弦和較求勾弦十五術曰股自乘股减弦和較為勾弦較除之得勾弦和加勾弦較半之為弦减勾弦較半之為勾問股六十尺弦和較二十四尺為勾弦和各幾答曰勾三十二尺弦六十八尺和九十二尺術曰股自乘得三千六百為實弦和較减股得勾弦較三十六為法除之得勾弦和一百加較半之為弦减較半之為勾勾與弦較較求股弦十六術曰勾自乘為實勾减弦較較即股弦較為法除實得股弦和减股弦較半之為股加股弦較半之為弦問勾三十二尺弦較較四十尺為股弦較各幾答曰股六十尺弦六十八尺較二十八尺術曰勾自乘為實勾减弦較較餘八即股弦較為法除實得一百二十八為股弦和减股弦較半之為股加股弦較半之為弦弦减弦較較得較股與弦較求勾弦十七
