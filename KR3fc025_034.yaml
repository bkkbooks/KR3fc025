body:
  text: 弦各幾荅曰股十五歩弦十七歩術曰容圓徑即弦和較股與弦和較求勾弦十五術曰股自乗股减弦和較爲勾弦較除之得勾弦和加勾弦較半之爲弦减勾弦較半之爲勾問股六十尺弦和較二十四尺爲勾弦和各幾荅曰勾三十二尺弦六十八尺和九十二尺術曰股自乗得三千六百爲實弦和較减股得勾弦較三十六爲法除之得勾弦和一百加較半之爲弦减較半之爲勾勾與弦較較求股弦十六術曰勾自乗爲實勾减弦較較即股弦較爲法除實得股弦和减股弦較半之爲股加股弦較半之爲弦問勾三十二尺弦較較四十尺爲股弦較各幾荅曰股六十尺弦六十八尺較二十八尺術曰勾自乗爲實勾减弦較較餘八即股弦較爲法除實得一百二十八爲股弦和减股弦較半之爲股加股弦較半之爲弦弦减弦較較得較股與弦較求勾弦十七
