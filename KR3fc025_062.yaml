body:
  text: 十分為步得城方法除股實得三萬六千八百五十二分十分為步得城去表兩餘勾求兩勾股測望三十四城上有戍樓不知高逺立兩表俱高一丈五尺表間相去八十步前後參直人目高四尺從前表退行三十步望樓岑與前表末參合望樓足入表五尺六寸又從後表退行五十步遙望樓岑與後表參合問城與戍樓各高幾何答曰樓高二丈八尺城高三丈一尺術曰以表間四百尺乘入表五十六寸得二千二百四十尺為城樓高之實以表高減人目及入表餘五尺四寸以乘表間得二千一百六十尺為城高之實以兩表退行相減餘百尺為法法除城高得二丈二尺四寸加入表為城之高法除樓高得二丈一尺六寸加表高減入表得樓高三丈一尺欲知城與樓共高以表減人目余一十一尺乘表間得四千四百尺以法除之得四丈四尺加表高一丈五尺即得松生山上不知高下立兩表各高二丈前後相去六十步從前表却行九步一尺人目薄地望松末與表端參
