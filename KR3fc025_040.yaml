body:
  text: 問直田積一百二十步廣不及縱七步為廣幾何答曰廣八步術曰四因田積得四百八十較自乘得四十九相併得五百二十九平方開之得勾股和二十三步加較半之為股減較半之為勾又曰以積一百二十步為實七為從方開之得勾有積勾股和求勾股弦二十一術曰積四因和自乘相減餘為實平方開之得勾股較以加和半之為股減和半之為勾又曰積二因和自乘相減餘為實平方開之徑得弦問直田一百二十步長濶相和二十三步為勾股弦各幾答曰勾八步股一十五步術曰四因田積得四百八十步和自乘得五百二十九相減餘四十九為實平方開之得七為勾股較以加和半之為股減和半之為勾有積弦求勾股二十二術曰四因積減弦自乘餘為實平方開之得勾股較問勾股田積六十步弦十七步問勾股各幾答曰勾八步股十五步
