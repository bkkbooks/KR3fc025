body:
  text: 問直田積一百二十歩廣不及縱七歩爲廣幾何荅曰廣八歩術曰四因田積得四百八十較自乗得四十九相併得五百二十九平方開之得勾股和二十三歩加較半之爲股减較半之爲勾又曰以積一百二十歩爲實七爲從方開之得勾有積勾股和求勾股弦二十一術曰積四因和自乗相减餘爲實平方開之得勾股較以加和半之爲股减和半之爲勾又曰積二因和自乗相减餘爲實平方開之徑得弦問直田一百二十歩長濶相和二十三歩爲勾股弦各幾荅曰勾八歩股一十五歩術曰四因田積得四百八十歩和自乗得五百二十九相减餘四十九爲實平方開之得七爲勾股較以加和半之爲股减和半之爲勾有積弦求勾股二十二術曰四因積减弦自乗餘爲實平方開之得勾股較問勾股田積六十歩弦十七歩問勾股各幾荅曰勾八歩股十五歩
