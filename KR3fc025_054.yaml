body:
  text: 二百歩參直從前表退行一百四十七歩三尺人目薄地望島峯與前表端齊又從後表退行一百五十二歩二尺人目薄地望島峯與後表端齊問島高及離前表各幾何荅曰島高四里六十六歩前表至島一百二里一百八十歩術曰島高爲勾島逺爲股以表高三丈每五尺一歩除之得六歩以乗表間得七千二百歩爲勾實以前表退行一百四十七歩三尺通作一百四十七歩六分以乗表間得一十七萬七千一百二十歩爲股實却以表退行相减餘四歩八分爲法除勾實得一千五百歩加表六歩爲島高法除股實得三萬六千九百歩爲島去前表之逺樹二表各高八尺南北相去二千裏以測日影夏至之日南表之影長六尺其北表之影差二寸問日高逺幾何荅曰日高八萬里去南表六萬里南表之端斜至日十萬里術曰日高爲股表去日爲勾表端斜至日爲弦先以表間二千里通爲七十二萬里每歩五十寸該三千
