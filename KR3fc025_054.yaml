body:
  text: 二百步參直從前表退行一百四十七步三尺人目薄地望島峯與前表端齊又從後表退行一百五十二步二尺人目薄地望島峯與後表端齊問島高及離前表各幾何答曰島高四里六十六步前表至島一百二里一百八十步術曰島高為勾島逺為股以表高三丈每五尺一步除之得六步以乘表間得七千二百步為勾實以前表退行一百四十七步三尺通作一百四十七步六分以乘表間得一十七萬七千一百二十步為股實却以表退行相減餘四步八分為法除勾實得一千五百步加表六步為島高法除股實得三萬六千九百步為島去前表之逺樹二表各高八尺南北相去二千裏以測日影夏至之日南表之影長六尺其北表之影差二寸問日高逺幾何答曰日高八萬里去南表六萬里南表之端斜至日十萬里術曰日高為股表去日為勾表端斜至日為弦先以表間二千里通為七十二萬里每步五十寸該三千
