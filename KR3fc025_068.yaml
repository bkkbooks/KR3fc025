body:
  text: 一丈二尺隨於入股去處橫設一矩從勾端望西北隅入橫股五尺若望東南隅入下股一丈八尺又重設矩於上相去四丈從勾端望東南隅入上股一丈七尺一寸問邑廣縱各幾何答曰東西廣一里四十步南北縱一里一百二十步術曰以勾高三十五寸乘東南隅入下股一百十寸得六千三百寸以入上股一百七十五寸除之得三十六寸與勾高相減餘一寸為法求縱以東南隅入下股與東北隅入下股相減餘六十寸以乘兩矩相距得二萬四千寸以法除之求廣以西北隅入橫股五寸乘兩矩相距得二萬寸以法除之勾與股率勾弦和率求股弦三十七甲善走乙次之甲行七乙行三今乙東行甲南行十步斜之會乙問各行幾何答曰甲南行十步斜行十四步乙東行十步半術曰南行勾也斜行弦也乙東行股也甲行七勾弦和率也乙行三股率也以勾弦和率自乘得四十九為勾和準以股率相乘併之勾弦和準折半得二十
