body:
  text: 合望松本入表二尺八寸從後表却行十步三尺人目薄地望松末與表端參合問松高幾何答曰松高一十二丈二尺八寸山去表一百九十七丈一尺七分尺之三術曰以表間六十步通為三百尺乘入表二尺八寸得八百四十尺為實以二表退行相减餘七尺為法除這得一百二十尺加入表二尺八寸為松之高求山去表以表間乘前表退行得一萬三千八百尺以法除之求山高以表高减入表餘一十七尺二寸以乘表間得五千一百六十尺以七尺為法除之得七百三十七尺七分尺之一求松與山共高以表高二十尺乘表間得六千尺以七尺為法除之得八百五十七尺七分尺之一加表高即得登山臨邑不知門高偃矩山上勾高三尺從勾端下望門額入下股四尺八寸望門閫入下股二尺八寸八分又立重矩於上相去五尺從勾端望門額入上股三尺六寸又望門閫入上股二尺四寸問城門高幾何答曰門高一丈術曰以兩矩相距五十寸乘門額入上股三十六寸
