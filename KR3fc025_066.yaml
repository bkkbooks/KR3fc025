body:
  text: 得一千八百寸以門額入上股與入下股相减餘一十二寸為法除之得門額去矩之數又以兩矩相距乘門閫入上股得一千二百寸以門閫入上股與入下股相减餘四寸八分為法除之得門閫去矩之數二數相减餘一百寸為門之高橫勾股測望三十五東南望波口立兩表南北相去九丈以索薄地連之當北表西行去表六丈薄地南望波口南岸入索北端四丈二尺北岸入索北端一丈二尺若去北表西行一十三丈五尺望南岸與南表參合問波口濶幾何答曰波口濶一里二百四十步術曰以後西行一千三百五十寸乘先望南岸入索四百二寸得五十四萬二千七百寸以兩表相去九百寸除之得六百三寸為景差與先西行相减餘三寸為法以前後西行相减餘七百五十寸乘望北岸入索得九萬寸為實法除實得三萬寸為波口濶數以里法步法約之合問直勾股橫勾股測望三十六登山臨邑邑在山南不知廣縱偃矩山上勾高三尺五寸與邑東南隅東北隅參合從勾端望東北隅入下股
