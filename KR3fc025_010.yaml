body:
  text: 吳興顧應祥者勾股求弦一術曰勾股各自乘併為實平方開之問勾八尺股十五尺為弦幾何答曰十七尺術曰勾自乘得六十四股自乘得二百二十五併之得二百八十九平方開之勾股田勾濶二十七步股長三十六步問弦斜幾何答曰弦斜長四十五步術見前木長二丈圍之三尺葛生其下纒水七周上與木齊問葛長幾何答曰二丈九尺術曰木長為勾圍七周共二十一尺為股以求葛為弦立木一丈六尺木尖有繩繫羊一隻共踐地九釐二毫問索幾何長答曰索長二丈圓徑二丈四尺術曰以地九釐二毫畝法通之四因三除平方開之
  hash: sha256:0d6e92850cbc894307fa152bf8d8c806298e6aaf1d760a566fcce8a4e32626f1
