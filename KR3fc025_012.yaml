body:
  text: 得圓徑折半為勾木長為股各自乘併為實平方開之得索長為弦方斜術附方五尺為斜幾何答曰七尺十五分尺之一術曰方為勾股斜為弦方自乘倍之如勾股併平方開之得七餘一倍方加隅命之方四尺一十八分尺之十七為斜幾何答曰七尺術曰分母乘其全分子從之自乘得七千九百二十一又以分母减分子餘一以乘分子仍得一十七益實得七千九百三十八倍之為一萬五千八百七十六為實平方開之得一百二十六如分母而一又曰分母自乘除實平方開之斜七步為方幾何答曰方四步一十八分步之一十七術曰斜自乘半之如弦自乘减勾求股平方開之得四餘實八步半倍方加隅得九數不可約法實皆倍命之斜七步十五分步之一為方幾何答曰方五步術曰分母乘其全分子從之自乘得一萬一千二百
