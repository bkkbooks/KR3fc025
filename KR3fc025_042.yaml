body:
  text: 術曰四因田積得二百四十步以減弦自乘二百八十九餘四十九為實開平方法除之得勾股較七又以積六十倍之得一百二十以七為從方平方開之得勾勾弦各自乘相減餘平方開之得股或問積何以用四因曰勾股得直田之半故也直田一畝兩隅斜量二十六步問廣長各幾何答曰廣十步長二十四步術曰二因積減弦自乘六百七十六餘一百九十六平方開之得勾股較勾股容方二十三術曰勾股相乘為實相併為法實如法而一問勾八尺股十五尺容方幾何答曰容方五尺二十三分尺之五術曰勾股相乘得一百二十尺為實相併得二十三為法勾股田一假勾六步股十二步容方池一口問徑若干答曰池徑四步術曰勾股相乘為實相併為法除之勾股容圓二十四術曰勾股相乘倍之為實勾股求弦併和為法除得
