body:
  text: 術曰四因田積得二百四十歩以减弦自乗二百八十九餘四十九爲實開平方法除之得勾股較七又以積六十倍之得一百二十以七爲從方平方開之得勾勾弦各自乗相减餘平方開之得股或問積何以用四因曰勾股得直田之半故也直田一畆兩隅斜量二十六歩問廣長各幾何荅曰廣十歩長二十四歩術曰二因積减弦自乗六百七十六餘一百九十六平方開之得勾股較勾股容方二十三術曰勾股相乗爲實相併爲法實如法而一問勾八尺股十五尺容方幾何荅曰容方五尺二十三分尺之五術曰勾股相乗得一百二十尺爲實相併得二十三爲法勾股田一叚勾六歩股十二歩容方池一口問徑若干荅曰池徑四歩術曰勾股相乗爲實相併爲法除之勾股容圓二十四術曰勾股相乗倍之爲實勾股求弦併和爲法除得
  hash: sha256:21eb19fcb9b817fc7934692a2fc4c0d8829f6d1cdc36699cbde68b612924072d
