body:
  text: 術曰橫不出四尺為勾弦較直不出二尺為股弦較如術求之直田一假不知長濶以濶較斜少五十步以斜較長又多九步問各幾答曰長八十步濶三十九步斜八十九步術曰濶較斜為勾弦較斜較長為股弦較如法求之股弦和與勾弦和求勾股弦十九術曰二和相乘倍之為實平方開之得弦和和减勾弦和得股减股弦和得勾問勾與弦和得二十五尺股與弦和得三十二尺為勾股弦各幾答曰勾八尺股十五尺弦十七尺術曰二和相乘得八百倍之得一千六百平方開之得四十尺為弦和和减勾弦和得股减弦和得勾减勾股和得弦有積勾股較求勾股弦二十術曰較自乘積四因相併平方開之即勾股和加較半之為股减較半之為勾又曰積為實較為從方開之徑得勾較為减從方開之徑得股積二因加較自乘平方開之徑得弦
  hash: sha256:1b1ef55c913a01866d6e8dd0d38ade6f67055f2cf25fcae472028cc32c492225
