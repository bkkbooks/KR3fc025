body:
  text: 術曰橫不出四尺爲勾弦較直不出二尺爲股弦較如術求之直田一叚不知長濶以濶較斜少五十歩以斜較長又多九歩問各幾荅曰長八十歩濶三十九歩斜八十九歩術曰濶較斜爲勾弦較斜較長爲股弦較如法求之股弦和與勾弦和求勾股弦十九術曰二和相乗倍之爲實平方開之得弦和和减勾弦和得股减股弦和得勾問勾與弦和得二十五尺股與弦和得三十二尺爲勾股弦各幾荅曰勾八尺股十五尺弦十七尺術曰二和相乗得八百倍之得一千六百平方開之得四十尺爲弦和和减勾弦和得股减弦和得勾减勾股和得弦有積勾股較求勾股弦二十術曰較自乗積四因相併平方開之即勾股和加較半之爲股减較半之爲勾又曰積爲實較爲從方開之徑得勾較爲减從方開之徑得股積二因加較自乗平方開之徑得弦
