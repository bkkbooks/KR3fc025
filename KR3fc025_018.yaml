body:
  text: 尺為股次以股弦各自乘相减餘為實平方開之得水深為勾勾與股弦較求股弦四術曰勾自乘較除之得股弦和减較半之為股加較半之為弦又曰勾較各自乘相减餘為實倍較為法除之徑得股又曰勾較各自乘相併為實倍較為法除之徑得弦問勾八尺股弦較二尺為股為弦各幾答曰股十五尺弦十七尺術曰勾自乘得六十四為實以較為法除之得三十二即股弦和加較半之為弦减較半之為股勾股田勾濶六十五步斜量比直量多五步問長幾何答曰長四百二十步術曰勾較各自乘相减餘四千二百步為實倍較為法除之池方一丈正中生葮出水一尺引葮至岸適與水靣齊問水深幾何答曰水深一丈二尺術曰半池為勾出水一尺為股弦較引葮至岸為弦
