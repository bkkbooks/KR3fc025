body:
  text: 勾股論說吳與顧應祥著勾股之法橫曰勾直曰股斜之為弦勾股相减其差曰較勾股相併曰和股弦之差曰股弦較勾弦之差曰勾弦較併勾股與弦相减之差則曰弦和較弦與勾股之差相减其差曰弦較較股弦相併則曰股弦和勾弦相併曰勾弦和勾股之差併弦則口弦較和勾股弦併曰弦和和勾股各自乘併為弦實平方開之得弦勾弦各自乘相减餘為股實平方開之得股股弦各自乘相减餘為勾實平方開之得勾倍弦實减勾股和自乘開其餘得勾股較减勾股較自乘開其餘得勾股和併勾弦以除股實得勾弦較勾弦之差除股實得勾弦和併股弦以除勾實得股弦較股弦之差除勾實得股弦和勾股和自乘减弦實弦較較除之得弦較和弦較和除之得弦較較勾股之差自乘以减弦實弦和和除之得弦和較弦和較除之得弦和和以勾乘股為實併勾股為法實如法而一勾股之容方也以勾乘股倍之為實勾股求弦併之為法實如法而一勾股容圓之徑也容圓之徑即弦和較也若錯綜為用勾加股弦較即弦較較减股弦較即弦和較加弦較和即股弦和股加勾弦較即弦較和减勾弦較即弦和較加弦較較即勾弦和勾
