body:
  text: 水深爲股立水垂索委地二尺引索斜直離木八尺問索長幾何荅曰索長十七尺術曰離水八尺爲勾委地二尺爲股弦較索長爲弦勾較各自乗相併得六十八尺爲實倍較得四爲法除之開門去閫不合二寸問門每扇廣幾何荅曰廣五尺五分術曰去閫一尺爲勾不合二寸半之爲股弦較門閫之半爲股門廣爲弦垣高一丈倚木齊垣木脚去本以畫記之臥而過畫一尺問畫去牆幾何荅曰木長五丈五寸畫去牆四丈九尺五寸術曰垣高爲勾過畫一尺爲較木長爲弦畫去牆爲股圓木泥在壁中鋸深一寸鋸道長一尺問木徑幾何荅曰二尺六寸術曰木徑如弦半鋸道如勾鋸深如半股弦較半勾自乗得二尺五寸半較除之如故加半較得徑圓田內截去弧矢时一叚弦長一十二歩矢濶四歩問
