body:
  text: 水深為股立水垂索委地二尺引索斜直離木八尺問索長幾何答曰索長十七尺術曰離水八尺為勾委地二尺為股弦較索長為弦勾較各自乘相併得六十八尺為實倍較得四為法除之開門去閫不合二寸問門每扇廣幾何答曰廣五尺五分術曰去閫一尺為勾不合二寸半之為股弦較門閫之半為股門廣為弦垣高一丈倚木齊垣木腳去本以畫記之臥而過畫一尺問畫去牆幾何答曰木長五丈五寸畫去牆四丈九尺五寸術曰垣高為勾過畫一尺為較木長為弦畫去牆為股圓木泥在壁中鋸深一寸鋸道長一尺問木徑幾何答曰二尺六寸術曰木徑如弦半鋸道如勾鋸深如半股弦較半勾自乘得二尺五寸半較除之如故加半較得徑圓田內截去弧矢時一假弦長一十二步矢濶四步問
