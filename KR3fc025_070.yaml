body:
  text: 九為弦準二率相乘得二十一為股準以弦準減勾弦和準餘二十為勾準以弦準乘勾以勾準除之得弦以股準乘勾以勾凖除之得股容方與勾股率求勾股弦二十八邑方十里每里三百步甲乙二人同立邑中乙東行率三甲南行率五甲乃斜磨邑角與乙會問各行幾何答曰甲南行二千三百步邑中行一千五百步南門外行八百步斜行四千八百八十七步半乙東行四千三百十二步半邑中行一千五百步出東門外二千八百一十二步半術曰南行勾也東行股也甲斜行弦也半邑方容方也甲行五勾弦和率也乙行三股率也以勾弦和率自乘得二十五為勾弦和準股率自乘得九併之減半得十七為弦準二率相乘得一十五為股凖以弦凖減勾弦和準餘八為勾凖乘半邑方得一萬二千步以股凖十五除之得餘勾八百步乃甲出南門外行步數加半邑方得勾二千三百步乃甲南行之數以弦凖乘勾以勾凖除之得弦乃甲斜行之數以股凖乘勾以勾凖除之得股乃乙東行之數
