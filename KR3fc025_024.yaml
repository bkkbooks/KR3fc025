body:
  text: 加較半之為股減較半之為勾直田不知廣縱只記得兩隅斜去六十八步廣少如縱二十八步問為田幾何答曰八畝廣三十二步術曰斜去為弦自乘得四千六百四十八步廣少如縱為較自乘得七百八十四步相減餘三千八百四十步半之得一千九百二十步為田積以較為從方開之得勾戶高多廣六尺八寸兩隅相去一丈問高廣各幾答曰高九尺六寸廣二尺八寸術曰兩隅相去為弦高多廣六尺八寸為勾股較如法求之勾與股弦和求股弦七術曰勾自乘和除之得股弦較以加和半之為弦減和半之為股又曰勾和各自乘相減餘為實倍和除之得股又曰勾和各自乘相併為實倍和除之得弦問勾八尺股弦和三十二尺為股為弦各幾答曰股十五尺弦十七尺術曰勾自乘得六十四以和除之得二為股弦較以
