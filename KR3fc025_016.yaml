body:
  text: 術曰圓徑為弦板厚為勾求濶為股股弦求勾三術曰股弦各自乘相減餘為實平方開之問股十五尺弦十七尺為勾幾何答曰八尺術曰股自乘得二百二十五弦自乘得二百八十九相減餘六十四為實平方開之勾股田一假股長三十六步弦斜四十五步問勾幾何答曰二十七步術見前臺上方四丈高四丈八尺四隅袤斜五丈四尺四寸問下方幾何答曰下方九丈一尺二寸術曰臺高為股袤斜為弦求勾以益上方斯得下方圓池八分魚吞釣釣沉在正中水底釣絲斜至岸長五十尺問水深若干答曰水深三十尺術曰半池徑為勾絲斜至岸為弦先以池八分畝法通之為一百九十二步四因三除得二百五十六步乎方開之得圓徑一十六步折半得八步通作四十
  hash: sha256:1c179ffa9bc063e812bae6c167f2f8e1ff66a9a94b36842532a66bce5a42330d
