body:
  text: 術曰圓徑爲弦板厚爲勾求濶爲股股弦求勾三術曰股弦各自乗相减餘爲實平方開之問股十五尺弦十七尺爲勾幾何荅曰八尺術曰股自乗得二百二十五弦自乗得二百八十九相减餘六十四爲實平方開之勾股田一叚股長三十六歩弦斜四十五歩問勾幾何荅曰二十七歩術見前臺上方四丈高四丈八尺四隅袤斜五丈四尺四寸問下方幾何荅曰下方九丈一尺二寸術曰䑓高爲股袤斜爲弦求勾以益上方斯得下方圓池八分魚吞釣釣沉在正中水底釣絲斜至岸長五十尺問水深若干荅曰水深三十尺術曰半池徑爲勾絲斜至岸爲弦先以池八分畆法通之爲一百九十二歩四因三除得二百五十六歩乎方開之得圓徑一十六歩折半得八歩通作四十
