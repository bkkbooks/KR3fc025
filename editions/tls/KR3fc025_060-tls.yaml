body:
  text: 二分减入索十歩餘通爲一百六十六尺以東表退行十四歩八分通爲七十四尺相乗得一萬二千二百八十四尺爲勾實以北行去表通爲三百二十四尺以乗入索五十尺得一萬六千二百尺以表間相去二百一十六尺除之得七十五尺爲景差又以北行去表减景差餘二百四十九尺以東表退行七十四尺乗之得一萬八千四百二十六尺爲股實却以東表退行减景差餘一尺爲法法除勾實得原數以歩約之得二千四百五十六歩八分加入表問四十三歩二分得城方二千五百歩法除股實得原數以歩約之得城去表三千六百八十五歩二分各以里約之合門又曰以表間相去减入索十歩餘通爲三百三十二分以乗東表退行一百四十八分得四萬九千一百三十六分爲勾實以北行去表六百四十八分乗入索百分得六萬四千八十分以表間相去四百三十二分除之得一百五十分爲景差又以後北行去表减景差餘四百九十八分以東表退行乗之得七萬三千七百四爲股實以東表退行减景差餘二爲法法除勾實得二萬四千五百六十八分每
