body:
  text: 術曰股自乗得三千六百股减弦較和餘勾弦較三十六爲法除實得勾弦和一百加較半這爲弦减較半之爲勾以弦减弦較和得較股與弦和和求勾弦十三術曰股自乗股减弦和和即勾弦和除之得勾弦較以减勾弦和半之爲勾加勾弦和半之爲弦又曰以股减和餘爲勾弦和問股六十尺弦和和一百六十尺爲勾弦和各幾荅曰勾三十二尺弦六十八尺勾股和九十二尺術曰股自乗得三千六百爲實股减和餘一百爲勾弦和除之得三十六爲勾弦較勾與弦和較求股弦十四術曰勾自乗爲實勾减較餘即股弦較爲法除實得股弦和加股弦較半之爲弦减股弦較半之爲股問勾三十二尺弦和較二十四尺爲股弦和各幾荅曰股六十尺弦六十八尺和九十二尺術曰勾自乗得一千二十四爲實勾减弦和較餘八即股弦較爲法除實得股弦和一百二十八加股弦較半這爲弦减股弦較半之爲股勾股相併得和勾股田一叚內容圓池一箇徑六歩只云勾八歩爲股
