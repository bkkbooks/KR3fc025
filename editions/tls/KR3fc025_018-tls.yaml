body:
  text: 尺爲股次以股弦各自乗相减餘爲實平方開之得水深爲勾勾與股弦較求股弦四術曰勾自乗較除之得股弦和减較半之爲股加較半之爲弦又曰勾較各自乗相减餘爲實倍較爲法除之徑得股又曰勾較各自乗相併爲實倍較爲法除之徑得弦問勾八尺股弦較二尺爲股爲弦各幾荅曰股十五尺弦十七尺術曰勾自乗得六十四爲實以較爲法除之得三十二即股弦和加較半之爲弦减較半之爲股勾股田勾濶六十五歩斜量比直量多五歩問長幾何荅曰長四百二十歩術曰勾較各自乗相减餘四千二百歩爲實倍較爲法除之池方一丈正中生葮出水一尺引葮至岸適與水靣齊問水深幾何荅曰水深一丈二尺術曰半池爲勾出水一尺爲股弦較引葮至岸爲弦
