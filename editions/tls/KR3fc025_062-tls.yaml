body:
  text: 十分爲歩得城方法除股實得三萬六千八百五十二分十分爲歩得城去表兩餘勾求兩勾股測望三十四城上有戍樓不知高逺立两表俱高一丈五尺表間相去八十歩前後參直人目高四尺從前表退行三十歩望樓岑與前表末參合望樓足入表五尺六寸又從後表退行五十歩遙望樓岑與後表參合問城與戍樓各高幾何荅曰樓高二丈八尺城高三丈一尺術曰以表間四百尺乗入表五十六寸得二千二百四十尺爲城樓高之實以表高减人目及入表餘五尺四寸以乗表間得二千一百六十尺爲城高之實以兩表退行相减餘百尺爲法法除城高得二丈二尺四寸加入表爲城之高法除樓高得二丈一尺六寸加表高减入表得樓高三丈一尺欲知城與樓共高以表减人目余一十一尺乗表間得四千四百尺以法除之得四丈四尺加表高一丈五尺即得松生山上不知高下立兩表各高二丈前後相去六十歩從前表却行九歩一尺人目薄地望松末與表端參
