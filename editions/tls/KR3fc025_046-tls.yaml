body:
  text: 吳興顧應祥著容方與餘勾求股二十八邑方二百歩四面居中開門東門外十五歩有木問出南門幾歩見木荅曰六百六十六歩六分歩之一術曰半邑方爲容方自乗得一萬歩爲實以東門外十五歩爲餘勾爲法除之此容方與餘勾求餘股邑東西七里南北九里各中開門東門外十五里有木問出南門外幾里見木荅曰一里一十八歩術曰以東西七里南北九里以每里三百六十歩通之折半相乗得二百四萬一千二百歩爲實以東門外十五里爲餘股以歩通之得五千四百歩爲法除之此容方與餘股求餘勾山不知高東五十三里有木高九十五尺木東三里有人目高五尺望木末與山齊問山高幾何荅曰山高一百五十九丈五尺術曰以山東五十三里每里一千八百尺通之得九萬五千四百尺以木高减人目乗之得容方積八百
