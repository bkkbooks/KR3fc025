body:
  text: 底入上股八尺五寸問谷深幾何荅曰谷深四十一丈九尺術曰谷深如股以下矩入股九十一寸乗矩間相去三百寸得二萬七千三百寸爲實以入二股數相减餘六寸爲法除之得四千五百五十寸减矩間幷勾得谷深乃下矩至谷底之數又術以入上股八十五寸乗矩間得二萬五千五百寸以二股相减餘六寸爲法除之得四千二百五十寸减勾高六十寸得谷深若求谷底濶若干以勾六十寸乗矩間得一萬八千寸以相减餘六寸除之得三千寸乃谷底濶三十丈兩餘勾橫測望三十三方城不知大小立兩表東西相去四十三歩二分齊人目處以索連之令東表與城東南隅東北隅參直從東表退北行去表一十四歩八分遙望城西北隅入索東端一十歩若從東表退北行去表六十四歩八分遙望城西北隅適與西表相參合問城方幾何城去表幾何荅曰城方六里三百四十歩去表一十里八十五歩五分歩之一術曰城方爲勾城去表爲股以表間相去四十三歩
