body:
  text: 勾股論説吳與顧應祥著勾股之法橫曰勾直曰股斜之爲弦勾股相减其差曰較勾股相併曰和股弦之差曰股弦較勾弦之差曰勾弦較併勾股與弦相减之差則曰弦和較弦與勾股之差相减其差曰弦較較股弦相併則曰股弦和勾弦相併曰勾弦和勾股之差併弦則口弦較和勾股弦併曰弦和和勾股各自乗併爲弦實平方開之得弦勾弦各自乗相减餘爲股實平方開之得股股弦各自乗相减餘爲勾實平方開之得勾倍弦實减勾股和自乗開其餘得勾股較减勾股較自乗開其餘得勾股和併勾弦以除股實得勾弦較勾弦之差除股實得勾弦和併股弦以除勾實得股弦較股弦之差除勾實得股弦和勾股和自乗减弦實弦較較除之得弦較和弦較和除之得弦較較勾股之差自乗以减弦實弦和和除之得弦和較弦和較除之得弦和和以勾乗股爲實併勾股爲法實如法而一勾股之容方也以勾乗股倍之爲實勾股求弦併之爲法實如法而一勾股容圓之徑也容圓之徑即弦和較也若錯綜爲用勾加股弦較即弦較較减股弦較即弦和較加弦較和即股弦和股加勾弦較即弦較和减勾弦較即弦和較加弦較較即勾弦和勾
