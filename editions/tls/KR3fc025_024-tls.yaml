body:
  text: 加較半之爲股减較半之爲勾直田不知廣縱只記得兩隅斜去六十八歩廣少如縱二十八歩問爲田幾何荅曰八畆廣三十二歩術曰斜去爲弦自乗得四千六百四十八歩廣少如縱爲較自乗得七百八十四歩相减餘三千八百四十歩半之得一千九百二十歩爲田積以較爲從方開之得勾戶高多廣六尺八寸兩隅相去一丈問高廣各幾荅曰高九尺六寸廣二尺八寸術曰兩隅相去爲弦高多廣六尺八寸爲勾股較如法求之勾與股弦和求股弦七術曰勾自乗和除之得股弦較以加和半之爲弦减和半之爲股又曰勾和各自乗相减餘爲實倍和除之得股又曰勾和各自乗相併爲實倍和除之得弦問勾八尺股弦和三十二尺爲股爲弦各幾荅曰股十五尺弦十七尺術曰勾自乗得六十四以和除之得二爲股弦較以
