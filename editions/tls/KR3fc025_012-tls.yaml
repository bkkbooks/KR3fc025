body:
  text: 得圓徑折半爲勾木長爲股各自乗併爲實平方開之得索長爲弦方斜術附方五尺爲斜幾何荅曰七尺十五分尺之一術曰方爲勾股斜爲弦方自乗倍之如勾股併平方開之得七餘一倍方加隅命之方四尺一十八分尺之十七爲斜幾何荅曰七尺術曰分母乗其全分子從之自乗得七千九百二十一又以分母减分子餘一以乗分子仍得一十七益實得七千九百三十八倍之爲一萬五千八百七十六爲實平方開之得一百二十六如分母而一又曰分母自乗除實平方開之斜七歩爲方幾何荅曰方四歩一十八分歩之一十七術曰斜自乗半之如弦自乗减勾求股平方開之得四餘實八歩半倍方加隅得九數不可約法實皆倍命之斜七歩十五分歩之一爲方幾何荅曰方五歩術曰分母乗其全分子從之自乗得一萬一千二百
