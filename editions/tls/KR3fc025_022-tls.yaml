body:
  text: 圓徑幾何荅曰一十三歩術曰半弦自乗得三十六歩以矢除之得九歩併矢四歩得圓徑股與勾弦較求勾弦五術曰股自乗較除之得勾弦和减較半之爲勾加較半之爲弦問股長十五尺勾弦較九尺爲勾弦各幾荅曰勾八尺弦一十七尺術曰股自乗得二百二十五尺以較九尺除之得二十五尺爲勾弦和减較半之爲勾加較半之爲弦弦與勾股較求勾股六術曰弦自乗倍之與較自乗相减餘爲實平方開之爲勾股和加較半之爲股减較半之爲勾又曰較自乗折半與較自乗相减餘折半爲實平方開之减半較得勾加半較得股問弦十七尺勾股較七尺爲勾爲股各幾荅曰勾八尺股十五尺術曰弦自乗倍之爲五百七十八較自乗得四十九相减餘五百二十九平方開之得二十三爲勾股和
