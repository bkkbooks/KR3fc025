body:
  text: 吳興顧應祥者勾股求弦一術曰勾股各自乗併爲實平方開之問勾八尺股十五尺爲弦幾何荅曰十七尺術曰勾自乗得六十四股自乗得二百二十五併之得二百八十九平方開之勾股田勾濶二十七歩股長三十六歩問弦斜幾何荅曰弦斜長四十五歩術見前木長二丈圍之三尺葛生其下纒水七周上與木齊問葛長幾何荅曰二丈九尺術曰木長爲勾圍七周共二十一尺爲股以求葛爲弦立木一丈六尺木尖有繩繋羊一隻共踐地九釐二毫問索幾何長荅曰索長二丈圓徑二丈四尺術曰以地九釐二毫畆法通之四因三除平方開之
  hash: sha256:d01c6ea71777595ade483a6f43cc6d3b81d9b9ea78c8cc257c00f98a16eaf850
