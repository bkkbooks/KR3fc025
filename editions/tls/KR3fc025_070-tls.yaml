body:
  text: 九爲弦準二率相乗得二十一爲股準以弦準减勾弦和準餘二十爲勾準以弦準乗勾以勾準除之得弦以股準乗勾以勾凖除之得股容方與勾股率求勾股弦二十八邑方十里每里三百歩甲乙二人同立邑中乙東行率三甲南行率五甲乃斜磨邑角與乙會問各行幾何荅曰甲南行二千三百歩邑中行一千五百歩南門外行八百歩斜行四千八百八十七歩半乙東行四千三百十二歩半邑中行一千五百歩出東門外二千八百一十二歩半術曰南行勾也東行股也甲斜行弦也半邑方容方也甲行五勾弦和率也乙行三股率也以勾弦和率自乗得二十五爲勾弦和準股率自乗得九併之减半得十七爲弦準二率相乗得一十五爲股凖以弦凖减勾弦和準餘八爲勾凖乗半邑方得一萬二千歩以股凖十五除之得餘勾八百歩乃甲出南門外行歩數加半邑方得勾二千三百歩乃甲南行之數以弦凖乗勾以勾凖除之得弦乃甲斜行之數以股凖乗勾以勾凖除之得股乃乙東行之數
