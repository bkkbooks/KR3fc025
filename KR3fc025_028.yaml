body:
  text: 荅曰八畆廣三十二歩術曰長自乗得三千六百歩廣斜相併自乗得一萬歩相减餘爲實倍和得二百爲法除之得廣乗縱得積弦與勾股和求勾股九術曰弦自乗倍之與和自乗相减餘爲實平方開之得勾股較减和半之爲勾加和半之爲股問弦十七尺勾股和二十三尺爲勾股各幾荅曰勾八尺股十五尺術曰弦自乗倍之得五百七十八和自乗得五百二十九相减餘四十九平方開之得七爲勾股較减和半之爲勾加和半之爲股直田一叚兩隅相去六十八歩廣縱相和九十二歩問田幾何荅曰八畆術曰以廣縱相和自乗得八千四百六十四弦自乗得四千六百二十四相减餘三千八百四十半之爲田積勾與弦較和求股弦十術曰勾自乗爲實勾和相併即股弦和除之得股弦
