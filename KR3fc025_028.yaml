body:
  text: 答曰八畝廣三十二步術曰長自乘得三千六百步廣斜相併自乘得一萬步相減餘為實倍和得二百為法除之得廣乘縱得積弦與勾股和求勾股九術曰弦自乘倍之與和自乘相減餘為實平方開之得勾股較減和半之為勾加和半之為股問弦十七尺勾股和二十三尺為勾股各幾答曰勾八尺股十五尺術曰弦自乘倍之得五百七十八和自乘得五百二十九相減餘四十九平方開之得七為勾股較減和半之為勾加和半之為股直田一假兩隅相去六十八步廣縱相和九十二步問田幾何答曰八畝術曰以廣縱相和自乘得八千四百六十四弦自乘得四千六百二十四相減餘三千八百四十半之為田積勾與弦較和求股弦十術曰勾自乘為實勾和相併即股弦和除之得股弦
