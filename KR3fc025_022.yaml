body:
  text: 圓徑幾何答曰一十三步術曰半弦自乘得三十六步以矢除之得九步併矢四步得圓徑股與勾弦較求勾弦五術曰股自乘較除之得勾弦和減較半之為勾加較半之為弦問股長十五尺勾弦較九尺為勾弦各幾答曰勾八尺弦一十七尺術曰股自乘得二百二十五尺以較九尺除之得二十五尺為勾弦和減較半之為勾加較半之為弦弦與勾股較求勾股六術曰弦自乘倍之與較自乘相減餘為實平方開之為勾股和加較半之為股減較半之為勾又曰較自乘折半與較自乘相減餘折半為實平方開之減半較得勾加半較得股問弦十七尺勾股較七尺為勾為股各幾答曰勾八尺股十五尺術曰弦自乘倍之為五百七十八較自乘得四十九相減餘五百二十九平方開之得二十三為勾股和
