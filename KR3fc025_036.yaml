body:
  text: 術曰股自乗爲實股併弦較較即勾弦和爲法除之得勾弦較以加勾弦和半之爲弦减勾弦和半之爲勾問股六十尺弦較較四十尺爲勾弦較各幾何荅曰勾三十二尺弦六十八尺較二十八尺術曰股自乗爲實股併弦較較得勾弦和一百爲法除之得三十六爲勾弦較减勾弦和半之爲勾加勾股和半之爲弦勾弦較與股弦較求勾股弦十八術曰二較相乗倍之爲實平方開之得弦和較加勾弦較得股减股弦較得勾勾股各自乗併而開方得弦問勾弦相較餘九尺股弦相較餘二尺爲勾股弦各幾荅曰勾八尺股十五尺弦十七尺術曰二較相乗倍之得三十六平方開之得弦和較六加股弦較得勾加勾弦較得股勾股各自乗併之平方開之得弦戶不知高廣竿不知長短橫之不出四尺縱之不出二尺斜之適出問高廣斜各若干荅曰高八尺廣六尺袤一丈
