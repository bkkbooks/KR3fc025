body:
  text: 術曰股自乘為實股併弦較較即勾弦和為法除之得勾弦較以加勾弦和半之為弦減勾弦和半之為勾問股六十尺弦較較四十尺為勾弦較各幾何答曰勾三十二尺弦六十八尺較二十八尺術曰股自乘為實股併弦較較得勾弦和一百為法除之得三十六為勾弦較減勾弦和半之為勾加勾股和半之為弦勾弦較與股弦較求勾股弦十八術曰二較相乘倍之為實平方開之得弦和較加勾弦較得股減股弦較得勾勾股各自乘併而開方得弦問勾弦相較餘九尺股弦相較餘二尺為勾股弦各幾答曰勾八尺股十五尺弦十七尺術曰二較相乘倍之得三十六平方開之得弦和較六加股弦較得勾加勾弦較得股勾股各自乘併之平方開之得弦戶不知高廣竿不知長短橫之不出四尺縱之不出二尺斜之適出問高廣斜各若干答曰高八尺廣六尺袤一丈
