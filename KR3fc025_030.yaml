body:
  text: 較以加股弦和半為弦以減股弦和半為股問勾三十二步弦與勾股較和九十六步為股弦較各幾答曰股六十步弦六十八步勾股較二十八步術曰勾自乘得一千二十四為實勾和相併得股弦和一百二十八為法除之得八為股弦較以加股弦和半之為弦以減股弦和半之為股以弦減弦較和得較勾與弦和和求股弦十一術曰勾自乘勾減和即股弦和為法除之得股弦較以減股弦和半之為股加股弦和半之為弦問勾三十二尺弦和和一百六十尺為股弦和各幾答曰股六十尺弦六十八尺勾股和九十二尺術曰勾自乘得一千二十四勾減和餘一百二十八為股弦和除之得股弦較八股與弦較和求勾弦十二術曰股自乘股減和得勾弦較除之得勾弦和加勾弦較半為弦減勾弦較半為勾問股六十尺弦較和九十六尺為勾弦較各幾答曰勾三十二尺弦六十八勾股較二十八尺
