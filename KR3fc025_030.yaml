body:
  text: 較以加股弦和半爲弦以减股弦和半爲股問勾三十二歩弦與勾股較和九十六歩爲股弦較各幾荅曰股六十歩弦六十八歩勾股較二十八歩術曰勾自乗得一千二十四爲實勾和相併得股弦和一百二十八爲法除之得八爲股弦較以加股弦和半之爲弦以减股弦和半之爲股以弦减弦較和得較勾與弦和和求股弦十一術曰勾自乗勾减和即股弦和爲法除之得股弦較以减股弦和半之爲股加股弦和半之爲弦問勾三十二尺弦和和一百六十尺爲股弦和各幾荅曰股六十尺弦六十八尺勾股和九十二尺術曰勾自乗得一千二十四勾减和餘一百二十八爲股弦和除之得股弦較八股與弦較和求勾弦十二術曰股自乗股减和得勾弦較除之得勾弦和加勾弦較半爲弦减勾弦較半爲勾問股六十尺弦較和九十六尺爲勾弦較各幾荅曰勾三十二尺弦六十八勾股較二十八尺
